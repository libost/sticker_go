name: Auto Release

on:
  push:
    tags:
      - "v*" # 只有推送以 v 开头的标签时才会触发（如 v1.0, v2.1.3）

jobs:
  build:
    name: Compile on - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: sticker_go_linux
            asset_name: sticker_go_linux
          - os: windows-latest
            artifact_name: sticker_go_windows
            asset_name: sticker_go_windows.exe # 给 Windows 加上后缀
          - os: macos-latest
            artifact_name: sticker_go_macos
            asset_name: sticker_go_macos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Compile
        run: go build -o ${{ matrix.asset_name }} main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  publish:
    name: Create Release
    needs: build  # 等待所有平台的编译任务完成后再执行
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限才能创建 Release
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all_binaries
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./all_binaries/*  # 上传该文件夹下的所有文件
          # body: "这是自动生成的发行说明" # 可以自定义更新日志
          # draft: false
          # prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}