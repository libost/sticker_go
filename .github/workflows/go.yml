# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Compile on ${{ matrix.os }} 
    runs-on: ${{ matrix.os }}  # 告诉 GitHub 分别开这几台机器
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: sticker_go
            suffix: ""
          - os: windows-latest
            artifact_name: sticker_go
            suffix: ".exe"
          - os: macos-latest
            artifact_name: sticker_go
            suffix: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build -v -o sticker_go-${{ matrix.os}}${{ matrix.suffix }}  # 这里换成你语言的编译命令

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ matrix.os }}  # 把不同平台的文件分别保存
          path: sticker_go*