# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Test and Build

on:
  push:
    branches: [ "dev" ]
    paths-ignore:
      - ".github/**"
      - ".github/workflows/**"
      - "config.yaml"
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - "docs/**"
      - "examples/**"
      - "scripts/**"
  pull_request:
    branches: [ "dev" ]
    paths-ignore:
      - ".github/**"
      - ".github/workflows/**"
      - "config.yaml"
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - "docs/**"
      - "examples/**"
      - "scripts/**"

permissions:
  contents: write

jobs:
  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Prepare stable dev prerelease tag
        run: |
          DEV_TAG="v0.0.0-dev"

          # Keep one dev prerelease by replacing the old release/tag if it exists.
          if gh release view "${DEV_TAG}" >/dev/null 2>&1; then
            gh release delete "${DEV_TAG}" --yes --cleanup-tag
          fi

          git tag -f "${DEV_TAG}"
          echo "DEV_TAG=${DEV_TAG}" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          RELEASE_CHANNEL: dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}