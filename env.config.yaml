general:
  token: "" # 你的 Telegram Bot API Token
  limit: 100 # 每个用户每天的使用限制
  limit_per_pack: 100 # 每个贴纸包的贴纸数量限制
  adminkey: "" # 管理员密钥

cache:
  expire_hours: 1 # 缓存过期小时数
  size_limit_mb: 500 # 缓存大小限制（MB）

subscription:
  enabled: false # 是否启用订阅检查
  channel: "" # 订阅频道用户名（例如 @yourchannel）

log:
  expire_days: 7 # 日志过期天数

webhook:
  enabled: false # 是否启用 Webhook
  url: "https://yourdomain.com/webhook" # 替换为你的服务器地址
  port: 8080 # Webhook 监听端
  secret: "your_webhook_secret" # 替换为你的 webhook 密钥

proxy:
  enabled: false # 是否启用代理
  type: "socks5" # 代理类型（例如 socks5、http）
  host: "proxy.example.com" # 替换为你的代理服务器地址
  port: 1080 # 替换为你的代理服务器端口
  username: "proxy_username" # 替换为你的代理用户名（如果需要）
  password: "proxy_password" # 替换为你的代理密码（如果需要）
  
misc:
  timezone: "Asia/Shanghai" # 时区设置