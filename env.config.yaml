token: "" # 你的 Telegram Bot API Token
limit: 100 # 每个用户每天的使用限制
limit_per_pack: 100 # 每个贴纸包的贴纸数量限制
cache_expire_hours: 1 # 缓存过期小时数
cache_size_limit_mb: 500 # 缓存大小限制（MB）
adminkey: "" # 管理员密钥
sub_toggle: false # 是否启用订阅检查
channel: "" # 订阅频道用户名（例如 @yourchannel）
log_expire_days: 7 # 日志过期天数
timezone: "Asia/Shanghai" # 时区设置