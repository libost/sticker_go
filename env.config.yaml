general:
  token: "" # 你的 Telegram Bot API Token
  limit: 100 # 每个用户每天的使用限制，默认是 100 次，根据需要调整
  limit_per_pack: 100 # 每个贴纸包的贴纸数量限制，默认是 100 张，根据需要调整
  adminkey: "" # 管理员密钥，请务必修改为安全的值，默认是 "123"
  tgs_support: false # 是否支持 .tgs 动画贴纸，默认是 false，启用后会将 .tgs 动画贴纸转换为 GIF 格式发送，禁用后将直接发送原始 .tgs 文件

cache:
  enabled: true # 是否启用缓存，默认是 true，启用后会将下载的贴纸包保存在本地缓存目录，减少重复下载，提高性能
  expire_hours: 1 # 缓存过期小时数，默认是 1 小时，超过这个时间未访问的缓存文件将被自动删除
  size_limit_mb: 500 # 缓存大小限制（MB），默认是 500 MB，根据需要调整

subscription:
  enabled: false # 是否启用订阅检查，默认是 false，启用后会检查用户是否订阅了指定的频道，未订阅的用户将无法使用贴纸包功能
  channel: "" # 订阅频道用户名（例如 @yourchannel），不启用订阅检查时可留空

log:
  level: "INFO" # 日志级别，默认是 "INFO"，可选值有 "DEBUG"、"INFO"、"WARN"、"ERROR"、"FATAL"
  expire_days: 7 # 日志过期天数，默认是 7 天，超过这个时间的日志文件将被自动删除

webhook:
  enabled: false # 是否启用 Webhook ，默认是 false，使用轮询模式
  nginx_enabled: false # 是否启用 Nginx 反向代理，默认是 false，如果启用 Webhook 并且使用 Nginx 反向代理，请将此项设置为 true
  url: "https://yourdomain.com/webhook" # 替换为你的服务器地址
  port: 8080 # Webhook 监听端口
  secret: "your_webhook_secret" # 替换为你的 webhook 密钥

proxy:
  enabled: false # 是否启用代理，默认是 false，不启用时以下配置项可留空
  type: "socks5" # 代理类型（例如 socks5、http）
  host: "proxy.example.com" # 替换为你的代理服务器地址
  port: 1080 # 替换为你的代理服务器端口
  username: "proxy_username" # 替换为你的代理用户名（如果需要）
  password: "proxy_password" # 替换为你的代理密码（如果需要）

misc:
  timezone: "Asia/Shanghai" # 时区设置，默认是 "Asia/Shanghai"，请根据需要修改为你的时区，例如 "UTC"、"America/New_York" 等