version: 2

before:
  hooks:
    - go mod download
    - go vet ./...

builds:
  - id: linux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    main: ./main.go
    ldflags: "-X github.com/libost/sticker_go/version.Version={{.Version}} -X github.com/libost/sticker_go/version.BuildTime={{.Date}} -X github.com/libost/sticker_go/version.GitCommit={{.ShortCommit}} -X github.com/libost/sticker_go/version.Branch=main"
    binary: sticker_go_linux

  - id: windows
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    main: ./main.go
    ldflags: "-X github.com/libost/sticker_go/version.Version={{.Version}} -X github.com/libost/sticker_go/version.BuildTime={{.Date}} -X github.com/libost/sticker_go/version.GitCommit={{.ShortCommit}} -X github.com/libost/sticker_go/version.Branch=main"
    binary: sticker_go_windows

  - id: macos
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
    main: ./main.go
    ldflags: "-X github.com/libost/sticker_go/version.Version={{.Version}} -X github.com/libost/sticker_go/version.BuildTime={{.Date}} -X github.com/libost/sticker_go/version.GitCommit={{.ShortCommit}} -X github.com/libost/sticker_go/version.Branch=main"
    binary: sticker_go_macos

archives:
  - id: binaries
    formats: [binary]
    builds:
      - linux
      - windows
      - macos

checksum:
  name_template: checksums.txt

nfpms:
  - id: "sticker_go"
    name: "sticker_go"
    maintainer: "libost"
    vendor: "libost"
    description: "A Telegram sticker conversion bot written in Go."
    license: "MIT"
    file_name_template: "sticker_go_{{.Version}}_{{.Os}}_{{.Arch}}.deb"
    formats:
      - deb
    contents:
      - src: ./env.config.yaml
        dst: /etc/sticker_go/config.yaml