version: 2.15

before:
  hooks:
    - go mod download
    - go vet ./...

builds:
  - id: linux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    main: ./main.go
    ldflags: "-X github.com/libost/sticker_go/version.Version={{ if eq .Env.RELEASE_CHANNEL \"dev\" }}{{ .ShortCommit }}{{ else }}{{ .Version }}{{ end }} -X github.com/libost/sticker_go/version.BuildTime={{.Date}} -X github.com/libost/sticker_go/version.GitCommit={{.ShortCommit}} -X github.com/libost/sticker_go/version.Branch={{.Branch}}"
    binary: sticker_go

  - id: windows
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    main: ./main.go
    ldflags: "-X github.com/libost/sticker_go/version.Version={{ if eq .Env.RELEASE_CHANNEL \"dev\" }}{{ .ShortCommit }}{{ else }}{{ .Version }}{{ end }} -X github.com/libost/sticker_go/version.BuildTime={{.Date}} -X github.com/libost/sticker_go/version.GitCommit={{.ShortCommit}} -X github.com/libost/sticker_go/version.Branch={{.Branch}}"
    binary: sticker_go

  - id: macos
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    ldflags: "-X github.com/libost/sticker_go/version.Version={{ if eq .Env.RELEASE_CHANNEL \"dev\" }}{{ .ShortCommit }}{{ else }}{{ .Version }}{{ end }} -X github.com/libost/sticker_go/version.BuildTime={{.Date}} -X github.com/libost/sticker_go/version.GitCommit={{.ShortCommit}} -X github.com/libost/sticker_go/version.Branch={{.Branch}}"
    binary: sticker_go

archives:
  - id: binaries
    formats: [binary]
    ids:
      - linux
      - windows
      - macos

checksum:
  name_template: checksums.txt

nfpms:
  - id: "sticker_go"
    maintainer: "libost"
    vendor: "libost"
    description: "A Telegram sticker conversion bot written in Go."
    license: "MIT"
    file_name_template: "sticker_go_{{.Version}}_{{.Os}}_{{.Arch}}.deb"
    formats:
      - deb
    contents:
      - src: ./env.config.yaml
        dst: /etc/sticker_go/config.yaml

release:
  prerelease: auto
  target_commitish: "{{ .Commit }}"
  mode: replace
  header: |
    {{ if eq .Env.RELEASE_CHANNEL "dev" }}## Pre-release {{ .ShortCommit }} auto generated at {{ .Date }}{{ else }}## Release {{ .Tag }} auto generated at {{ .Date }}{{ end }}  


changelog:
  sort: asc
  use: github
  abbrev: 7
  format: "{{ .SHA }}: {{ .Message }}{{ if .Logins }} ({{ .Logins | englishJoin }}){{ end }}"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Maintenance
      regexp: '^.*?(chore|docs|style|refactor|perf|test)(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - '^Merge pull request #\d+ from .+$'
      - '^Merge branch .+$'

announce:
  telegram:
    enabled: true
    chat_id: "@BangDream0114"
    message_template: |
      {{ if eq .Env.RELEASE_CHANNEL "dev" }}🚀 {{ .ProjectName | mdv2escape }} 新测试版发行: {{ .ShortCommit }}{{ else }}🎉 {{ .ProjectName | mdv2escape }} 新版本发行: {{ .Tag }}{{ end }}  

      [有问题点我反馈]({{ .Env.FEEDBACK | mdv2escape }}) 

      [更新日志]({{ .ReleaseURL }})
    parse_mode: MarkdownV2